<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produk Sebelum Login</title>
  <link href="/src/output.css" rel="stylesheet">
  <style>
    [data-add-cart] {

    }
  </style>
</head>
<body class="bg-gray-800 min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-20 border-b border-default bg-neutral-primary/95 backdrop-blur">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
      <a href="./index.html" class="flex items-center gap-3">
        <span class="text-lg md:text-xl text-heading font-semibold whitespace-nowrap">ZAN STORE</span>
      </a>

      <div class="hidden md:block relative w-full max-w-sm">
        <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
          <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/></svg>
        </div>
        <input type="text" id="search-desktop" data-product-search class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Search produk...">
      </div>

      <ul class="flex items-center gap-2 md:gap-4 text-sm font-medium">
        <li><a href="./index.html" class="block py-2 px-3 text-white bg-gray-500 rounded-base">Home</a></li>
        <li><a href="./login.html" class="block py-2 px-3 text-heading rounded-base hover:bg-neutral-tertiary">Masuk</a></li>
      </ul>
    </div>
  </nav>

  <main class="pt-24 pb-14">
      <section class="max-w-screen-xl mx-auto px-4">
        <div class="rounded-base p-6 md:p-12 text-center bg-gradient-to-r from-gray-800 to-gray-900">
          <h1 class="mb-3 text-3xl md:text-5xl font-bold tracking-tight text-white">Belanja di ZAN STORE</h1>
          <p class="text-white/80 md:text-lg mb-6">Koleksi terbaik & harga bersahabat</p>
          <div class="flex items-center justify-center gap-3">
            <a href="#container" class="px-6 py-3 bg-gray-500 text-white rounded-md font-medium">Lihat Produk</a>
            <a href="/view/login.html" class="px-6 py-3 bg-gray-500 text-white rounded-md font-medium">Login</a>
          </div>
        </div>
    </section>

    <section class="max-w-screen-xl mx-auto px-4 mt-8">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-2xl md:text-3xl font-bold text-white">Products</h2>
      </div>
      <div id="container" class="grid grid-cols-1 sm:grid-cols-2 gap-5"></div>
    </section>
  </main>

  <script src="/script/produk.js"></script>

</html>
